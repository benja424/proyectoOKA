<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Funcionarios | S.I.G.S.M. — Hospital de Clínicas</title>
  <link rel="icon" type="image/png" href="img/logohc.png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Source+Serif+4:wght@600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/login.css">
</head>
<body>

  <div class="login-card">

    <!-- Logo -->
    <a href="index.html" class="login-marca">
      <img src="img/logohc.png" alt="Hospital de Clínicas Dr. Manuel Quintela" class="login-marca__logo">
      <span class="login-marca__texto">
        <span class="login-marca__nombre">Hospital de Clínicas</span>
        <span class="login-marca__sistema">S.I.G.S.M.</span>
      </span>
    </a>

    <h1 class="login-titulo">Acceso para funcionarios</h1>
    <p class="login-subtitulo">Ingresá con tus credenciales institucionales.</p>

    <form action="portal-admin.html" method="get">

      <div class="campo">
        <label for="usuario">Usuario</label>
        <input
          type="text"
          id="usuario"
          name="usuario"
          placeholder="Ej: jperez"
          autocomplete="username"
          required>
      </div>

      <div class="campo">
        <label for="contrasena">Contraseña</label>
        <input
          type="password"
          id="contrasena"
          name="contrasena"
          placeholder="••••••••"
          autocomplete="current-password"
          required>
      </div>

      <button type="submit" class="btn-ingresar">Ingresar</button>

    </form>

    <p class="login-volver">
      ¿No sos funcionario? <a href="index.html">Volver al portal de pacientes</a>
    </p>

  </div>

</body>
</html>
